<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі конкурсу | Єдина платформа конкурсів України</title>
    <meta name="description" content="Детальна інформація про конкурс">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/competitions.css">
    <style>
        /* Competition Detail Styles */
        .competition-detail {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            transition: color var(--transition-fast);
        }

        .back-link:hover {
            color: var(--primary-blue);
        }

        .competition-header {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 1px solid var(--gray-100);
        }

        .competition-header-banner {
            height: 12px;
            background: var(--gradient-primary);
        }

        .competition-header-content {
            padding: 2rem;
        }

        .competition-badges {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .competition-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .competition-meta-row {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-100);
        }

        .meta-block {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .meta-block svg {
            color: var(--gray-400);
        }

        .meta-block .label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
        }

        .meta-block .value {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--gray-800);
        }

        .competition-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .content-main {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .content-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-100);
            overflow: hidden;
        }

        .info-card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-card-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 0;
        }

        .info-card-header svg {
            color: var(--gray-500);
        }

        .info-card-body {
            padding: 1.5rem;
        }

        .description-text {
            font-size: 0.9375rem;
            color: var(--gray-700);
            line-height: 1.7;
        }

        .sections-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .section-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--gray-50);
            border-radius: var(--radius-sm);
        }

        .section-item-icon {
            width: 32px;
            height: 32px;
            background: var(--primary-blue);
            color: var(--white);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .section-item-content h4 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-800);
            margin: 0 0 0.25rem 0;
        }

        .section-item-content p {
            font-size: 0.8125rem;
            color: var(--gray-500);
            margin: 0;
        }

        /* Apply Card */
        .apply-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-100);
            padding: 1.5rem;
            position: sticky;
            top: 1.5rem;
        }

        .apply-card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 0 0 1rem 0;
        }

        .deadline-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--warning-bg, rgba(250, 204, 21, 0.1));
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
        }

        .deadline-info svg {
            color: #CA8A04;
            flex-shrink: 0;
        }

        .deadline-info span {
            font-size: 0.8125rem;
            color: var(--gray-700);
        }

        .deadline-info strong {
            color: var(--gray-900);
        }

        .apply-btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
        }

        .apply-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: var(--radius-sm);
            margin-top: 1rem;
        }

        .apply-status.submitted {
            background: rgba(59, 130, 246, 0.1);
        }

        .apply-status.under_review {
            background: rgba(250, 204, 21, 0.1);
        }

        .apply-status.accepted {
            background: rgba(16, 185, 129, 0.1);
        }

        .apply-status.rejected {
            background: rgba(239, 68, 68, 0.1);
        }

        .apply-status svg {
            flex-shrink: 0;
        }

        .apply-status.submitted svg { color: var(--info); }
        .apply-status.under_review svg { color: #CA8A04; }
        .apply-status.accepted svg { color: var(--success); }
        .apply-status.rejected svg { color: var(--error); }

        .apply-status-text h4 {
            font-size: 0.875rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
        }

        .apply-status.submitted .apply-status-text h4 { color: var(--info); }
        .apply-status.under_review .apply-status-text h4 { color: #CA8A04; }
        .apply-status.accepted .apply-status-text h4 { color: var(--success); }
        .apply-status.rejected .apply-status-text h4 { color: var(--error); }

        .apply-status-text p {
            font-size: 0.8125rem;
            color: var(--gray-600);
            margin: 0;
        }

        .deadline-passed {
            color: var(--error);
            font-weight: 600;
        }

        .participants-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            background: var(--gray-50);
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
        }

        .participants-info span {
            font-size: 0.8125rem;
            color: var(--gray-600);
        }

        .participants-info strong {
            font-size: 1rem;
            color: var(--primary-dark);
        }

        /* Rules List */
        .rules-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .rules-list li {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--gray-100);
        }

        .rules-list li:last-child {
            border-bottom: none;
        }

        .rules-list li svg {
            color: var(--success);
            flex-shrink: 0;
            margin-top: 0.125rem;
        }

        .rules-list li span {
            font-size: 0.875rem;
            color: var(--gray-700);
        }

        @media (max-width: 768px) {
            .competition-content {
                grid-template-columns: 1fr;
            }

            .apply-card {
                position: static;
            }

            .competition-meta-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .competition-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Завантаження...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Dashboard Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                        <path d="M16 8V16M16 16L8 12M16 16L24 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="sidebar-title">
                    Платформа конкурсів
                    <span>Україна</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <div class="nav-section">
                    <div class="nav-section-title">Головне</div>
                    <a href="/dashboard.html" class="nav-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        <span>Головна</span>
                    </a>
                    <a href="/competitions.html" class="nav-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                        <span>Конкурси</span>
                    </a>
                    <a href="/my-applications.html" class="nav-item" id="navMyApplications" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <span>Мої заявки</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user" id="sidebarUser">
                    <div class="user-avatar">UK</div>
                    <div class="user-info">
                        <div class="user-name">Завантаження...</div>
                        <div class="user-role">...</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle" aria-label="Меню">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h1 class="page-title">Деталі конкурсу</h1>
                </div>
                <div class="topbar-right">
                    <button class="logout-btn" id="logoutBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Вийти</span>
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            <main class="page-content">
                <div class="competition-detail" id="competitionDetail">
                    <!-- Dynamic content will be rendered here -->
                    <div class="competitions-loading">
                        <div class="loading-spinner"></div>
                        <p>Завантаження даних конкурсу...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Application Form Modal -->
    <div class="modal-overlay" id="applicationModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Подати заявку</h2>
                <button class="modal-close" onclick="closeModal('applicationModal')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="applicationForm">
                    <div class="form-group">
                        <label for="sectionSelect">Секція <span>*</span></label>
                        <select class="form-control" id="sectionSelect" name="section_id" required>
                            <option value="">Оберіть секцію</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="workTitle">Назва роботи <span>*</span></label>
                        <input type="text" class="form-control" id="workTitle" name="title" required placeholder="Введіть назву вашої роботи">
                    </div>
                    <div class="form-group">
                        <label for="workDescription">Опис роботи</label>
                        <textarea class="form-control" id="workDescription" name="description" rows="4" placeholder="Опишіть вашу роботу (необов'язково)"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="workFile">Файл роботи</label>
                        <input type="file" class="form-control" id="workFile" name="file" accept=".pdf,.doc,.docx,.zip,.rar">
                        <small style="color: var(--gray-500); font-size: 0.75rem; margin-top: 0.25rem; display: block;">
                            Дозволені формати: PDF, DOC, DOCX, ZIP, RAR. Максимальний розмір: 10MB
                        </small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('applicationModal')">Скасувати</button>
                <button type="submit" form="applicationForm" class="btn btn-primary" id="submitApplicationBtn">
                    Надіслати заявку
                </button>
            </div>
        </div>
    </div>

    <script src="/js/competition-detail.js"></script>
</body>
</html>
