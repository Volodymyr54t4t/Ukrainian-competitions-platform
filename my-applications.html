<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої заявки | Єдина платформа конкурсів України</title>
    <meta name="description" content="Перегляд ваших заявок на конкурси">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/competitions.css">
    <style>
        /* My Applications Styles */
        .applications-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .application-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-100);
            overflow: hidden;
            transition: all var(--transition-fast);
        }

        .application-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--gray-200);
        }

        .application-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 1.5rem;
            gap: 1rem;
        }

        .application-info {
            flex: 1;
        }

        .application-competition {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.375rem;
        }

        .application-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .application-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .application-meta-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.8125rem;
            color: var(--gray-500);
        }

        .application-meta-item svg {
            width: 14px;
            height: 14px;
            color: var(--gray-400);
        }

        .application-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.875rem;
            border-radius: var(--radius-md);
            font-size: 0.8125rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .application-status-badge.submitted {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
        }

        .application-status-badge.under_review,
        .application-status-badge.pending {
            background: rgba(250, 204, 21, 0.1);
            color: #CA8A04;
        }

        .application-status-badge.accepted,
        .application-status-badge.approved {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .application-status-badge.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .application-status-badge svg {
            width: 16px;
            height: 16px;
        }

        .application-card-body {
            padding: 0 1.5rem 1.5rem;
        }

        .application-description {
            font-size: 0.875rem;
            color: var(--gray-600);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .application-file {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--gray-50);
            border-radius: var(--radius-sm);
            font-size: 0.8125rem;
            color: var(--gray-700);
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .application-file:hover {
            background: var(--gray-100);
        }

        .application-file svg {
            width: 16px;
            height: 16px;
            color: var(--gray-500);
        }

        .application-card-footer {
            padding: 1rem 1.5rem;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .application-date {
            font-size: 0.8125rem;
            color: var(--gray-500);
        }

        .application-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            border: 1px solid var(--gray-100);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .stat-card-label {
            font-size: 0.8125rem;
            color: var(--gray-500);
        }

        .stat-card-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-card-icon svg {
            width: 16px;
            height: 16px;
        }

        .stat-card-icon.blue {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
        }

        .stat-card-icon.yellow {
            background: rgba(250, 204, 21, 0.1);
            color: #CA8A04;
        }

        .stat-card-icon.green {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .stat-card-icon.red {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .stat-card-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 0.25rem;
            padding: 0.25rem;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .filter-tab {
            padding: 0.625rem 1rem;
            border: none;
            background: transparent;
            font-family: var(--font-family);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .filter-tab:hover {
            color: var(--gray-800);
        }

        .filter-tab.active {
            background: var(--white);
            color: var(--primary-dark);
            box-shadow: var(--shadow-sm);
        }

        @media (max-width: 768px) {
            .application-card-header {
                flex-direction: column;
            }

            .application-status-badge {
                align-self: flex-start;
            }

            .application-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Завантаження...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Dashboard Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                        <path d="M16 8V16M16 16L8 12M16 16L24 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="sidebar-title">
                    Платформа конкурсів
                    <span>Україна</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <div class="nav-section">
                    <div class="nav-section-title">Головне</div>
                    <a href="/dashboard.html" class="nav-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        <span>Головна</span>
                    </a>
                    <a href="/competitions.html" class="nav-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                        <span>Конкурси</span>
                    </a>
                    <a href="/my-applications.html" class="nav-item active">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <span>Мої заявки</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user" id="sidebarUser">
                    <div class="user-avatar">UK</div>
                    <div class="user-info">
                        <div class="user-name">Завантаження...</div>
                        <div class="user-role">...</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle" aria-label="Меню">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h1 class="page-title">Мої заявки</h1>
                </div>
                <div class="topbar-right">
                    <button class="logout-btn" id="logoutBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Вийти</span>
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            <main class="page-content">
                <!-- Page Header -->
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>Мої заявки</h1>
                        <p>Перегляд статусу та історії ваших заявок на конкурси</p>
                    </div>
                    <div class="page-header-actions">
                        <a href="/competitions.html" class="btn btn-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                            <span>Подати нову заявку</span>
                        </a>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="stats-cards" id="statsCards">
                    <!-- Dynamic stats -->
                </div>

                <!-- Filter Tabs -->
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-tab active" data-filter="all">Всі заявки</button>
                    <button class="filter-tab" data-filter="submitted">Подані</button>
                    <button class="filter-tab" data-filter="under_review">На розгляді</button>
                    <button class="filter-tab" data-filter="accepted">Прийняті</button>
                    <button class="filter-tab" data-filter="rejected">Відхилені</button>
                </div>

                <!-- Applications List -->
                <div class="applications-list" id="applicationsList">
                    <div class="competitions-loading">
                        <div class="loading-spinner"></div>
                        <p>Завантаження заявок...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/my-applications.js"></script>
</body>
</html>
